<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Twemoji Example</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    #messages { border: 1px solid #ddd; height: 400px; overflow: auto; padding: 8px; }
    .msg { margin: 6px 0; }
    .me { text-align: right; }
    .meta { color: #666; font-size: 0.9em; }
    #composer { margin-top: 12px; }
  </style>
</head>
<body>
  <h3>Twemoji Integration Example</h3>
  <div id="messages"></div>
  <div id="composer">
    <input id="text" placeholder="Type a message with emoji like 😀 or :smile:" style="width:70%" />
    <button id="send">Send</button>
  </div>

  <!-- Twemoji from CDN -->
  <script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js"></script>
  <script src="./main.js"></script>
</body>
</html>
